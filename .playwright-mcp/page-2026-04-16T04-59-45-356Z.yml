              - paragraph [ref=e967]: Enjoy a leisurely evening stroll through Poble-sec, stopping at the charming local tapas bars along Carrer de Blai. The lively atmosphere and delicious pintxos make it a perfect spot to experience Barcelona’s nightlife.
