              - paragraph [ref=e915]: Wander through the charming streets of Gràcia, where local cafes and artisan shops abound. Don’t miss trying the 'pan con tomate' at La Xula Tapería on Carrer de Verdi — a simple yet flavorful dish that captures the essence of Catalan cuisine.
              - paragraph [ref=e916]: "\"This neighborhood feels like a secret world of flavors, and the 'pan con tomate' is a must-try for any visitor!\""
              - paragraph [ref=e917]: Mark Wiens · Eater
