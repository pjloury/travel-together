              - paragraph [ref=e935]: Head to the historical bar, Bobby's Free, tucked away on Pau Claris. Enjoy a glass of homemade vermouth and tapas in a cozy atmosphere that feels like stepping into a local's living room.
              - paragraph [ref=e936]: "\"The vermouth here is magic, and the ambiance makes you want to linger for hours.\""
              - paragraph [ref=e937]: Adventurous Kate · Condé Nast Traveler
