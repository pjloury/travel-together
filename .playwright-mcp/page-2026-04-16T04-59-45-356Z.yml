                - button "+" [ref=e924] [cursor=pointer]
              - paragraph [ref=e925]: Explore the vibrant street art scene in the Raval neighborhood, particularly along Carrer de Joaquín Costa. The stunning murals tell stories of the city’s diverse culture and make for a perfect backdrop for photos.
              - paragraph [ref=e926]: "\"Discovering these murals felt like finding hidden treasures in the heart of the city.\""
              - paragraph [ref=e927]: Kiona · Atlas Obscura
