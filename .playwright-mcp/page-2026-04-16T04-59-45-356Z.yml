              - paragraph [ref=e989]: Indulge in the traditional Spanish treat at Chök, the chocolate kitchen, located on Carrer del Carme. Their churros with rich, melted chocolate are a heavenly experience that you can't miss.
              - paragraph [ref=e990]: "\"Every bite is like a warm hug in dessert form!\""
